name: WikiRetain
options:
  bundleIdPrefix: com.wikiretain
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 6.2
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""

targets:
  WikiRetain:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WikiRetain
        excludes:
          - "corpus.db"
          - "corpus.db copy"
    resources:
      - path: WikiRetain/corpus.db
        optional: true
        onDemandResourceTags:
          - corpus
    info:
      path: WikiRetain/Resources/Info.plist
      properties:
        CFBundleDisplayName: WikiRetain
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSLocalNetworkUsageDescription: "Used to download the Wikipedia corpus from your Mac over Wi-Fi."
        NSBonjourServices:
          - "_http._tcp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wikiretain.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: WikiRetain/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_LDFLAGS: "-lsqlite3"
    dependencies:
      - sdk: CoreData.framework
        embed: false
